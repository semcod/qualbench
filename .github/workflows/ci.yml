name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[test]"

      - name: Lint
        run: |
          ruff check qualbench/ tests/

      - name: Test
        run: |
          pytest tests/ -v --tb=short --cov=qualbench --cov-report=term-missing

      - name: Validate dataset
        run: |
          python -c "from qualbench.dataset import Dataset; ds = Dataset.load('dataset/qualbench-v0.json'); print(f'Dataset OK: {len(ds)} issues')"
