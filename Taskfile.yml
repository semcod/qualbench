version: '1'
name: qualbench
description: Minimal Taskfile
variables:
  APP_NAME: qualbench
environments:
  local:
    container_runtime: docker
    compose_command: docker compose
pipeline:
  python_version: "3.12"
  runner_image: ubuntu-latest
  branches: [main]
  cache: [~/.cache/pip]
  artifacts: [dist/]

  stages:
    - name: lint
      tasks: [lint]

    - name: test
      tasks: [test]

    - name: build
      tasks: [build]
      when: "branch:main"

tasks:
  install:
    desc: Install Python dependencies (editable)
    cmds:
    - pip install -e .[dev]
  test:
    desc: Run pytest suite
    cmds:
    - pytest -q
  lint:
    desc: Run ruff lint check
    cmds:
    - ruff check .
  fmt:
    desc: Auto-format with ruff
    cmds:
    - ruff format .
  build:
    desc: Build wheel + sdist
    cmds:
    - python -m build
  clean:
    desc: Remove build artefacts
    cmds:
    - rm -rf build/ dist/ *.egg-info
  all:
    desc: '[imported from Makefile] all'
    deps:
    - test
    - lint
    - benchmark
    - evaluate
    - leaderboard
  quickstart:
    desc: '[imported from Makefile] quickstart'
    cmds:
    - qualbench quickstart
  run:
    desc: '[imported from Makefile] run'
    cmds:
    - qualbench run --tool prollama
  run-json:
    desc: '[imported from Makefile] run-json'
    cmds:
    - qualbench run --tool prollama --json
  setup-repos:
    desc: '[imported from Makefile] setup-repos'
    cmds:
    - qualbench setup --dataset $(DATASET)
  benchmark:
    desc: '[imported from Makefile] benchmark'
    deps:
    - run-copilot
    - run-openhands
    - run-prollama
  run-copilot:
    desc: '[imported from Makefile] run-copilot'
    cmds:
    - python runners/copilot_runner.py --dataset $(DATASET) --output $(RESULTS_DIR)/copilot/
      --timeout $(TIMEOUT)
  run-openhands:
    desc: '[imported from Makefile] run-openhands'
    cmds:
    - python runners/openhands_runner.py --dataset $(DATASET) --output $(RESULTS_DIR)/openhands/
      --timeout $(TIMEOUT)
  run-prollama:
    desc: '[imported from Makefile] run-prollama'
    cmds:
    - python runners/prollama_runner.py --dataset $(DATASET) --output $(RESULTS_DIR)/prollama/
      --timeout $(TIMEOUT)
  run-custom:
    desc: '[imported from Makefile] run-custom'
    cmds:
    - 'test -n "$(TOOL)" || (echo "Usage: make run-custom TOOL=my_tool" && exit 1)'
    - python runners/$(TOOL).py --dataset $(DATASET) --output $(RESULTS_DIR)/$(TOOL)/
      --timeout $(TIMEOUT)
  evaluate:
    desc: '[imported from Makefile] evaluate'
    cmds:
    - python scripts/evaluate.py --results-dir $(RESULTS_DIR) --dataset $(DATASET)
  leaderboard:
    desc: '[imported from Makefile] leaderboard'
    cmds:
    - python scripts/score.py --evaluation $(RESULTS_DIR)/evaluation.json --leaderboard
      LEADERBOARD.md
    - cat LEADERBOARD.md
  docker-build:
    desc: '[imported from Makefile] docker-build'
    cmds:
    - docker build -t semcod/qualbench-action:latest action/
  docker-run:
    desc: '[imported from Makefile] docker-run'
    cmds:
    - docker run --rm -v $(PWD):/workspace -w /workspace semcod/qualbench-action:latest
  serve:
    desc: '[imported from Makefile] serve'
    cmds:
    - python server.py
  serve-api:
    desc: '[imported from Makefile] serve-api'
    cmds:
    - uvicorn qualbench.api:app --reload --port 8000
  submit:
    desc: '[imported from Makefile] submit'
    cmds:
    - qualbench submit --tool prollama
  view-leaderboard:
    desc: '[imported from Makefile] view-leaderboard'
    cmds:
    - qualbench leaderboard
  health:
    desc: '[from doql] workflow: health'
    cmds:
    - docker compose ps
    - docker compose exec app echo "Health check passed"
  import-makefile-hint:
    desc: '[from doql] workflow: import-makefile-hint'
    cmds:
    - 'echo ''Run: taskfile import Makefile to import existing targets.'''
  help:
    desc: Show available tasks
    cmds:
    - echo "qualbench — available tasks:"
    - echo ""
    - taskfile list
  format:
    desc: Auto-format with ruff (alias of fmt)
    cmds:
    - ruff format .
